pre-commit:
  parallel: true
  commands:
    gofmt:
      glob: "*.go"
      run: test -z "$(gofmt -l {staged_files})" || { gofmt -d {staged_files}; echo "Run: gofmt -w" >&2; exit 1; }
    prettier:
      glob: "*.{ts,tsx,js,json,md,yml,yaml,css,html}"
      run: npx prettier --check {staged_files}
    eslint:
      glob: "*.{ts,tsx}"
      run: npx eslint --max-warnings=0 {staged_files}
    stylelint:
      glob: "*.css"
      run: npx stylelint {staged_files}
    markdownlint:
      glob: "*.md"
      run: npx markdownlint {staged_files}

pre-push:
  parallel: false
  commands:
    quality:
      run: make quality
    race:
      run: cd backend && go test -race $(go list ./... | grep -v /integration_test)
