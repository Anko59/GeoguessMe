openapi: 3.1.0
info:
  title: GeoGuessMe API
  version: 1.0.0
  description: Real-time multiplayer location game API.
  license: { name: MIT, identifier: MIT }
servers:
  - url: /api/v1
    description: Same-origin API gateway prefix.
paths:
  /auth/signup:
    $ref: ./openapi/paths/auth.yaml#/signup
  /auth/login:
    $ref: ./openapi/paths/auth.yaml#/login
  /auth/refresh:
    $ref: ./openapi/paths/auth.yaml#/refresh
  /auth/logout:
    $ref: ./openapi/paths/auth.yaml#/logout
  /auth/verify/request:
    $ref: ./openapi/paths/auth.yaml#/requestVerification
  /auth/verify:
    $ref: ./openapi/paths/auth.yaml#/verify
  /auth/password/forgot:
    $ref: ./openapi/paths/auth.yaml#/forgotPassword
  /auth/password/reset:
    $ref: ./openapi/paths/auth.yaml#/resetPassword
  /auth/password/change:
    $ref: ./openapi/paths/auth.yaml#/changePassword
  /auth/profile:
    $ref: ./openapi/paths/auth.yaml#/updateProfile
  /auth/account:
    $ref: ./openapi/paths/auth.yaml#/deleteAccount
  /user/groups:
    $ref: ./openapi/paths/groups.yaml#/userGroups
  /group/create:
    $ref: ./openapi/paths/groups.yaml#/createGroup
  /group/join:
    $ref: ./openapi/paths/groups.yaml#/joinGroup
  /group/details:
    $ref: ./openapi/paths/groups.yaml#/groupDetails
  /group/members:
    $ref: ./openapi/paths/groups.yaml#/groupMembers
  /group/leaderboard:
    $ref: ./openapi/paths/groups.yaml#/leaderboard
  /group/messages:
    $ref: ./openapi/paths/groups.yaml#/messages
  /photo/upload:
    $ref: ./openapi/paths/challenges.yaml#/upload
  /challenges/{photoID}/accept:
    $ref: ./openapi/paths/challenges.yaml#/accept
  /challenges/{photoID}/media:
    $ref: ./openapi/paths/challenges.yaml#/media
  /challenges/{photoID}/guess:
    $ref: ./openapi/paths/challenges.yaml#/guess
  /challenges/{photoID}/results:
    $ref: ./openapi/paths/challenges.yaml#/results
  /ws/ticket:
    $ref: ./openapi/paths/websocket.yaml#/ticket
  /ws:
    $ref: ./openapi/paths/websocket.yaml#/chat
components:
  securitySchemes:
    bearerAuth:
      $ref: ./openapi/components/security.yaml#/bearerAuth
    cookieAuth:
      $ref: ./openapi/components/security.yaml#/cookieAuth
  schemas:
    $ref: ./openapi/components/schemas.yaml
  responses:
    ErrorResponse:
      $ref: ./openapi/components/responses.yaml#/ErrorResponse
