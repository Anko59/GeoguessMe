components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token from login/signup/refresh
    cookieAuth:
      type: apiKey
      in: cookie
      name: refresh_token
      description: HttpOnly refresh cookie (path /api/v1/auth)
  schemas:
    APIError:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: invalid_username
            message:
              type: string
              example: Username must be at least 3 characters
    AuthUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        email_verified_at:
          type: string
          format: date-time
          nullable: true
        avatar:
          type: string
    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
        expires_in:
          type: integer
          example: 900
        user:
          $ref: "#/components/schemas/AuthUser"
    Group:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        code:
          type: string
          example: ABC123
        created_at:
          type: string
          format: date-time
    LeaderboardEntry:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        username:
          type: string
        score:
          type: integer
        guess_count:
          type: integer
        average_score:
          type: number
    Message:
      type: object
      properties:
        id:
          type: string
          format: uuid
        group_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        username:
          type: string
        avatar:
          type: string
        kind:
          type: string
          enum: [text, challenge, system]
        photo_id:
          type: string
          format: uuid
          nullable: true
        content:
          type: string
        created_at:
          type: string
          format: date-time
    ChallengeCreated:
      type: object
      properties:
        id:
          type: string
          format: uuid
        group_id:
          type: string
          format: uuid
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        server_time:
          type: string
          format: date-time
    ChallengeAccepted:
      type: object
      properties:
        photo_id:
          type: string
          format: uuid
        media_url:
          type: string
          example: /api/v1/challenges/{id}/media
        accepted_at:
          type: string
          format: date-time
        view_expires_at:
          type: string
          format: date-time
        guess_after:
          type: string
          format: date-time
        challenge_expires_at:
          type: string
          format: date-time
        server_time:
          type: string
          format: date-time
    GuessResponse:
      type: object
      properties:
        guess_id:
          type: string
          format: uuid
        photo_id:
          type: string
          format: uuid
        score:
          type: integer
        distance:
          type: number
          description: Distance in meters
        created_at:
          type: string
          format: date-time
        duplicate:
          type: boolean
        server_time:
          type: string
          format: date-time
    ChallengeResults:
      type: object
      properties:
        photo_id:
          type: string
          format: uuid
        group_id:
          type: string
          format: uuid
        actual_lat:
          type: number
          format: double
        actual_long:
          type: number
          format: double
        guesses:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              photo_id:
                type: string
                format: uuid
              user_id:
                type: string
                format: uuid
              group_id:
                type: string
                format: uuid
              lat:
                type: number
                format: double
              long:
                type: number
                format: double
              score:
                type: integer
              distance:
                type: number
              created_at:
                type: string
                format: date-time
              username:
                type: string
              avatar:
                type: string
        media_available:
          type: boolean
        media_url:
          type: string
          nullable: true
        server_time:
          type: string
          format: date-time
  responses:
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIError"
