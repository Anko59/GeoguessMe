userGroups:
  get:
    operationId: listUserGroups
    summary: List the authenticated user's groups.
    tags: [Groups]
    security: [{ bearerAuth: [] }]
    responses:
      "200":
        description: Groups.
        content: { application/json: { schema: { type: array, items: { $ref: "../components/schemas.yaml#/Group" } } } }
      "401": { $ref: "../components/responses.yaml#/ErrorResponse" }

createGroup:
  post:
    operationId: createGroup
    summary: Create a group.
    tags: [Groups]
    security: [{ bearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema: { type: object, required: [name], properties: { name: { type: string, maxLength: 100 } } }
    responses:
      "201":
        description: Group created.
        content: { application/json: { schema: { $ref: "../components/schemas.yaml#/Group" } } }
      "400": { $ref: "../components/responses.yaml#/ErrorResponse" }

joinGroup:
  post:
    operationId: joinGroup
    summary: Join a group by code.
    tags: [Groups]
    security: [{ bearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema: { type: object, required: [code], properties: { code: { type: string, pattern: "^[A-Z0-9]{6}$" } } }
    responses:
      "200":
        description: Joined group.
        content: { application/json: { schema: { $ref: "../components/schemas.yaml#/Group" } } }
      "404": { $ref: "../components/responses.yaml#/ErrorResponse" }
      "409": { $ref: "../components/responses.yaml#/ErrorResponse" }

groupDetails:
  get:
    operationId: getGroupDetails
    summary: Get group details.
    tags: [Groups]
    security: [{ bearerAuth: [] }]
    parameters:
      - { name: id, in: query, required: true, schema: { type: string, format: uuid } }
    responses:
      "200":
        description: Group details.
        content: { application/json: { schema: { $ref: "../components/schemas.yaml#/Group" } } }
      "403": { $ref: "../components/responses.yaml#/ErrorResponse" }

groupMembers:
  get:
    operationId: listGroupMembers
    summary: List group members.
    tags: [Groups]
    security: [{ bearerAuth: [] }]
    parameters:
      - { name: id, in: query, required: true, schema: { type: string, format: uuid } }
    responses:
      "200":
        {
          description: Members.,
          content:
            { application/json: { schema: { type: array, items: { $ref: "../components/schemas.yaml#/Member" } } } },
        }
      "403": { $ref: "../components/responses.yaml#/ErrorResponse" }

leaderboard:
  get:
    operationId: getLeaderboard
    summary: Get the group leaderboard.
    tags: [Groups]
    security: [{ bearerAuth: [] }]
    parameters:
      - { name: group_id, in: query, required: true, schema: { type: string, format: uuid } }
    responses:
      "200":
        {
          description: Leaderboard.,
          content:
            {
              application/json:
                { schema: { type: array, items: { $ref: "../components/schemas.yaml#/LeaderboardEntry" } } },
            },
        }
      "403": { $ref: "../components/responses.yaml#/ErrorResponse" }

messages:
  get:
    operationId: listGroupMessages
    summary: Get cursor-paginated group messages.
    tags: [Groups]
    security: [{ bearerAuth: [] }]
    parameters:
      - { name: group_id, in: query, required: true, schema: { type: string, format: uuid } }
      - {
          name: cursor,
          in: query,
          description: Opaque base64 cursor from a previous next_cursor; empty selects the most recent page,
          schema: { type: string },
        }
      - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 500, default: 500 } }
      - {
          name: after_id,
          in: query,
          description: Legacy message id resolved onto the cursor for reconnect catch-up; ignored when cursor is set,
          schema: { type: string },
        }
    responses:
      "200":
        description: Message page.
        content: { application/json: { schema: { $ref: "../components/schemas.yaml#/MessagesPage" } } }
      "403": { $ref: "../components/responses.yaml#/ErrorResponse" }
