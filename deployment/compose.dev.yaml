# Development stack: PostgreSQL 15, MinIO, Mailpit, backend hot reload (Air),
# and Vite hot reload. Replaces the old root docker-compose.yml.
name: geoguessme-dev

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: geoguessme
    ports: ["5432:5432"]
    volumes: ["geoguessme_dev_db:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d geoguessme"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: ["geoguessme_dev_minio:/data"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

  mailpit:
    image: axllent/mailpit:v1.21
    ports: ["1025:1025", "8025:8025"]

  backend:
    build:
      context: .
      dockerfile: deployment/docker/backend.dev.Dockerfile
    command: ["sh", "-c", "go run . migrate up && air"]
    ports: ["8080:8080"]
    environment:
      APP_ENV: development
      DATABASE_URL: postgres://user:password@db:5432/geoguessme?sslmode=disable
      JWT_SECRET: dev_secret_key_change_me_please_32_characters
      PUBLIC_URL: http://localhost:5173
      ALLOWED_ORIGINS: http://localhost:5173
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: geoguessme-media
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_USE_PATH_STYLE: "true"
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_FROM: no-reply@localhost
      SMTP_TLS: "off"
    depends_on:
      db: { condition: service_healthy }
      minio: { condition: service_healthy }
      mailpit: { condition: service_started }
    volumes: ["./backend:/app/backend"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8080/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 20

  frontend:
    build:
      context: .
      dockerfile: deployment/docker/frontend.dev.Dockerfile
    ports: ["5173:5173"]
    volumes: ["./frontend:/app/frontend", "/app/frontend/node_modules"]
    environment: { CHOKIDAR_USEPOLLING: "true" }
    depends_on:
      backend: { condition: service_healthy }

volumes:
  geoguessme_dev_db:
  geoguessme_dev_minio:
