# Production stack. Images are referenced by immutable tags supplied through the
# environment; there is no implicit "latest" so deploys are reproducible.
# PostgreSQL, SMTP, and S3 are external by default. Optional local-service
# profiles (local-db, local-minio, local-smtp) exist only for staging/restore
# exercises and are not enabled by a normal deploy.
#
# Required environment:
#   BACKEND_IMAGE   e.g. ghcr.io/org/geoguessme-backend:1.2.3
#   WEB_IMAGE       e.g. ghcr.io/org/geoguessme-web:1.2.3
#   DATABASE_URL    external Postgres (sslmode=require)
#   S3_*            external private S3-compatible bucket
#   SMTP_*          external authenticated SMTP (starttls or tls)
# Provide secrets via deployment/env/production.env (git-ignored).

name: geoguessme-prod

services:
  migration:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE must be set to an immutable tag}
    command: ["migrate", "up"]
    env_file:
      - path: env/production.env
        required: false
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
        required: false

  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE must be set to an immutable tag}
    command: ["serve"]
    env_file:
      - path: env/production.env
        required: false
    read_only: true
    tmpfs: ["/tmp"]
    restart: unless-stopped
    depends_on:
      migration: { condition: service_completed_successfully }
    healthcheck:
      test: ["CMD", "/usr/local/bin/geoguessme", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: ${WEB_IMAGE:?WEB_IMAGE must be set to an immutable tag}
    ports: ["80:80"]
    read_only: true
    tmpfs:
      - "/data:uid=1000,gid=1000,mode=0755"
      - "/config:uid=1000,gid=1000,mode=0755"
    restart: unless-stopped
    depends_on:
      backend: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Optional local services for staging/restore exercises ---------------
  db:
    image: postgres:15-alpine@sha256:3d0f7584ed7d04e27fa050d6683a74746608faf21f202be78460d679cc56461f # PostgreSQL 15
    profiles: [local-db]
    env_file:
      - path: env/production.env
        required: false
    volumes: ["geoguessme_prod_db:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 30

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z@sha256:9535594ad4122b7a78c6632788a989b96d9199b483d3bd71a5ceae73a922cdfa # MinIO release
    profiles: [local-minio]
    command: server /data --console-address ":9001"
    env_file:
      - path: env/production.env
        required: false
    volumes: ["geoguessme_prod_minio:/data"]

  smtp:
    image: axllent/mailpit:v1.21@sha256:81370195cd4a0eab9604d17c2617a7525b0486f9365555253b6c5376c6350f1a # Mailpit 1.21
    profiles: [local-smtp]
    ports: ["${GEOGUESSME_PROD_VERIFY_SMTP_PORT:-8025}:8025"]

volumes:
  geoguessme_prod_db:
  geoguessme_prod_minio:
