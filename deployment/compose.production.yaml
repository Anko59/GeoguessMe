# Production stack. Images are referenced by immutable tags supplied through the
# environment; there is no implicit "latest" so deploys are reproducible.
# PostgreSQL, SMTP, and S3 are external by default. Optional local-service
# profiles (local-db, local-minio, local-smtp) exist only for staging/restore
# exercises and are not enabled by a normal deploy.
#
# Required environment:
#   BACKEND_IMAGE   e.g. ghcr.io/org/geoguessme-backend:1.2.3
#   WEB_IMAGE       e.g. ghcr.io/org/geoguessme-web:1.2.3
#   DATABASE_URL    external Postgres (sslmode=require)
#   S3_*            external private S3-compatible bucket
#   SMTP_*          external authenticated SMTP (starttls or tls)
# Provide secrets via deployment/env/production.env (git-ignored).

name: geoguessme-prod

services:
  migration:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE must be set to an immutable tag}
    command: ["migrate", "up"]
    env_file:
      - path: env/production.env
        required: false
    restart: "no"

  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE must be set to an immutable tag}
    command: ["serve"]
    env_file:
      - path: env/production.env
        required: false
    read_only: true
    tmpfs: ["/tmp"]
    restart: unless-stopped
    depends_on:
      migration: { condition: service_completed_successfully }
    healthcheck:
      test: ["CMD", "/usr/local/bin/geoguessme", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: ${WEB_IMAGE:?WEB_IMAGE must be set to an immutable tag}
    ports: ["80:80"]
    restart: unless-stopped
    depends_on:
      backend: { condition: service_healthy }

  # --- Optional local services for staging/restore exercises ---------------
  db:
    image: postgres:15-alpine
    profiles: [local-db]
    env_file:
      - path: env/production.env
        required: false
    volumes: ["geoguessme_prod_db:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 30

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    profiles: [local-minio]
    command: server /data --console-address ":9001"
    env_file:
      - path: env/production.env
        required: false
    volumes: ["geoguessme_prod_minio:/data"]

  smtp:
    image: axllent/mailpit:v1.21
    profiles: [local-smtp]
    ports: ["8025:8025"]

volumes:
  geoguessme_prod_db:
  geoguessme_prod_minio:
