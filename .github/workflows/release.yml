name: Release

on:
  push:
    branches: [main]

concurrency:
  group: geoguessme-production-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  promote:
    name: Promote verified development images
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      packages: write
    outputs:
      backend: ${{ steps.refs.outputs.backend }}
      web: ${{ steps.refs.outputs.web }}
      tag: ${{ steps.source.outputs.tag }}
    steps:
      - name: Check out release commit
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
      - name: Install pinned Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6
        with:
          cosign-release: v2.5.3
      - name: Resolve tested source and release version
        id: source
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags origin
          git fetch --force origin dev:refs/remotes/origin/dev
          dev_sha=$(git rev-parse refs/remotes/origin/dev)
          main_tree=$(git rev-parse "$GITHUB_SHA^{tree}")
          dev_tree=$(git rev-parse "$dev_sha^{tree}")
          if [[ "$main_tree" != "$dev_tree" ]]; then
            echo "main does not contain the exact tested dev tree." >&2
            exit 1
          fi
          latest=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname |
            grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [[ -z "$latest" ]]; then
            tag=v0.2.0
          elif [[ "$latest" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            major=${BASH_REMATCH[1]}
            minor=${BASH_REMATCH[2]}
            patch=${BASH_REMATCH[3]}
            if (( major == 0 && minor < 2 )); then
              tag=v0.2.0
            else
              tag="v${major}.${minor}.$((patch + 1))"
            fi
          else
            echo "Latest release tag is not semantic: $latest" >&2
            exit 1
          fi
          if git rev-parse --verify --quiet "refs/tags/$tag"; then
            echo "Release tag already exists: $tag" >&2
            exit 1
          fi
          {
            echo "dev_sha=$dev_sha"
            echo "tag=$tag"
          } >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve registry names
        id: names
        env:
          DEV_SHA: ${{ steps.source.outputs.dev_sha }}
          RELEASE_TAG: ${{ steps.source.outputs.tag }}
        run: |
          owner=$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          {
            echo "backend_source=ghcr.io/$owner/geoguessme-backend:dev-$DEV_SHA"
            echo "web_source=ghcr.io/$owner/geoguessme-web:dev-$DEV_SHA"
            echo "backend_release=ghcr.io/$owner/geoguessme-backend:$RELEASE_TAG"
            echo "web_release=ghcr.io/$owner/geoguessme-web:$RELEASE_TAG"
          } >> "$GITHUB_OUTPUT"
      - name: Resolve immutable development digests
        id: digests
        env:
          BACKEND_SOURCE: ${{ steps.names.outputs.backend_source }}
          WEB_SOURCE: ${{ steps.names.outputs.web_source }}
        shell: bash
        run: |
          set -euo pipefail
          backend=$(docker buildx imagetools inspect "$BACKEND_SOURCE" \
            --format '{{json .Manifest.Digest}}' | tr -d '"')
          web=$(docker buildx imagetools inspect "$WEB_SOURCE" \
            --format '{{json .Manifest.Digest}}' | tr -d '"')
          for digest in "$backend" "$web"; do
            [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]] || {
              echo "Registry returned an invalid digest." >&2
              exit 1
            }
          done
          {
            echo "backend=$backend"
            echo "web=$web"
          } >> "$GITHUB_OUTPUT"
      - name: Verify development workflow signatures
        env:
          DEV_SHA: ${{ steps.source.outputs.dev_sha }}
          BACKEND: ${{ steps.names.outputs.backend_source }}@${{ steps.digests.outputs.backend }}
          WEB: ${{ steps.names.outputs.web_source }}@${{ steps.digests.outputs.web }}
        run: |
          for image in "$BACKEND" "$WEB"; do
            cosign verify \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              --certificate-identity-regexp '^https://github.com/Anko59/GeoguessMe/.github/workflows/deploy\.yml@refs/heads/dev$' \
              --annotations "revision=$DEV_SHA" "$image" >/dev/null
          done
      - name: Promote immutable manifests without rebuilding
        env:
          BACKEND_SOURCE: ${{ steps.names.outputs.backend_source }}@${{ steps.digests.outputs.backend }}
          WEB_SOURCE: ${{ steps.names.outputs.web_source }}@${{ steps.digests.outputs.web }}
          BACKEND_RELEASE: ${{ steps.names.outputs.backend_release }}
          WEB_RELEASE: ${{ steps.names.outputs.web_release }}
        run: |
          docker buildx imagetools create --tag "$BACKEND_RELEASE" "$BACKEND_SOURCE"
          docker buildx imagetools create --tag "$WEB_RELEASE" "$WEB_SOURCE"
      - name: Verify promoted digests
        env:
          BACKEND_RELEASE: ${{ steps.names.outputs.backend_release }}
          WEB_RELEASE: ${{ steps.names.outputs.web_release }}
          BACKEND_DIGEST: ${{ steps.digests.outputs.backend }}
          WEB_DIGEST: ${{ steps.digests.outputs.web }}
        shell: bash
        run: |
          set -euo pipefail
          actual_backend=$(docker buildx imagetools inspect "$BACKEND_RELEASE" \
            --format '{{json .Manifest.Digest}}' | tr -d '"')
          actual_web=$(docker buildx imagetools inspect "$WEB_RELEASE" \
            --format '{{json .Manifest.Digest}}' | tr -d '"')
          [[ "$actual_backend" == "$BACKEND_DIGEST" ]]
          [[ "$actual_web" == "$WEB_DIGEST" ]]
      - name: Sign promoted digests for production
        env:
          BACKEND: ${{ steps.names.outputs.backend_release }}@${{ steps.digests.outputs.backend }}
          WEB: ${{ steps.names.outputs.web_release }}@${{ steps.digests.outputs.web }}
        run: |
          cosign sign --yes -a "revision=$GITHUB_SHA" "$BACKEND"
          cosign sign --yes -a "revision=$GITHUB_SHA" "$WEB"
      - name: Export immutable references
        id: refs
        run: |
          {
            echo "backend=${{ steps.names.outputs.backend_release }}@${{ steps.digests.outputs.backend }}"
            echo "web=${{ steps.names.outputs.web_release }}@${{ steps.digests.outputs.web }}"
          } >> "$GITHUB_OUTPUT"
      - name: Create GitHub release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228
        with:
          tag_name: ${{ steps.source.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          body: |
            Promoted from the exact signed development images tested and
            deployed at `${{ steps.source.outputs.dev_sha }}`.

            ```text
            BACKEND_IMAGE=${{ steps.names.outputs.backend_release }}@${{ steps.digests.outputs.backend }}
            WEB_IMAGE=${{ steps.names.outputs.web_release }}@${{ steps.digests.outputs.web }}
            ```

  deploy:
    name: Deploy production digest
    needs: promote
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    concurrency:
      group: geoguessme-host-deployment
      cancel-in-progress: false
    steps:
      - name: Install pinned cloudflared
        run: |
          curl -fsSLo cloudflared.deb https://github.com/cloudflare/cloudflared/releases/download/2026.7.2/cloudflared-linux-amd64.deb
          echo '88195157a136199a86977c122a22084dae6907480bbe3640222b7b55834afc3a  cloudflared.deb' | sha256sum -c -
          sudo dpkg -i cloudflared.deb
      - name: Deploy through Cloudflare Access
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
          TUNNEL_SERVICE_TOKEN_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          TUNNEL_SERVICE_TOKEN_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          BACKEND: ${{ needs.promote.outputs.backend }}
          WEB: ${{ needs.promote.outputs.web }}
        run: |
          install -d -m 0700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 0600 ~/.ssh/deploy ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy -o IdentitiesOnly=yes \
            -o ProxyCommand='cloudflared access ssh --hostname %h' \
            deploy@deploy.geoguessme.com \
            "deploy $BACKEND $WEB $GITHUB_SHA"
