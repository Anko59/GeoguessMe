name: Nightly verification

on:
  schedule:
    - cron: "41 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: geoguessme-nightly-verification
  cancel-in-progress: true

jobs:
  verify:
    name: Complete operational gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out dev
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: dev
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
        with:
          buildkitd-config-inline: |
            [worker.oci]
              gc = true
              gckeepstorage = 20000000000
      - name: Restore Docker cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: /tmp/.buildx-cache
          key: docker-${{ runner.os }}-nightly-${{ hashFiles('backend/go.sum', 'frontend/package-lock.json') }}
          restore-keys: docker-${{ runner.os }}-nightly-
      - name: Bootstrap pinned tools
        run: make bootstrap
      - name: Run complete verification
        env:
          BUILDX_BUILDER: ${{ steps.buildx.outputs.name }}
        run: |
          make verify \
            DOCKER_BUILD_FLAGS="--cache-from type=local,src=/tmp/.buildx-cache --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max"
      - name: Save Docker cache
        if: always()
        run: |
          if [[ -d /tmp/.buildx-cache-new ]]; then
            rm -rf /tmp/.buildx-cache
            mv /tmp/.buildx-cache-new /tmp/.buildx-cache
          fi
      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: geoguessme-nightly-${{ github.run_id }}
          retention-days: 7
          if-no-files-found: ignore
          path: |
            frontend/playwright-report/
            frontend/test-results/
            frontend/coverage/
            backend/coverage.out
