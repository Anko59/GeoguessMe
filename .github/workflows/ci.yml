name: CI

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  verify:
    name: Dockerized verification gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd922
      - name: Bootstrap pinned tool containers
        run: make bootstrap
      - name: Run the complete release gate
        run: make verify
      - name: Upload reports, logs, and traces on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: geoguessme-verification-artifacts
          if-no-files-found: ignore
          path: |
            frontend/playwright-report/
            frontend/test-results/
            frontend/coverage/
            backend/coverage.out
            coverage/
