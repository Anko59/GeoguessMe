# CI verification gate.
#
# Uses Docker Buildx with scoped cache and bounded artifact retention.  The
# BuildKit GC configuration prevents unbounded Docker layer growth.  Artifacts
# are retained for 7 days to preserve failure diagnostics.  No secrets, .env
# files, or sensitive variables are cached or uploaded.
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  # Branch scope for cache key (hashFiles is evaluated in step context).
  CACHE_BRANCH: ${{ github.ref_name }}

jobs:
  verify:
    name: Dockerized verification gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Docker Buildx with bounded cache
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          install: true
          buildkitd-config-inline: |
            [worker.oci]
              gc = true
              gckeepstorage = 20000000000

      - name: Cache Docker build layers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/.buildx-cache
          key: docker-${{ runner.os }}-${{ env.CACHE_BRANCH }}-${{ hashFiles('backend/go.sum', 'frontend/package-lock.json') }}
          restore-keys: |
            docker-${{ runner.os }}-${{ env.CACHE_BRANCH }}-
            docker-${{ runner.os }}-

      - name: Bootstrap pinned tool containers
        run: make bootstrap

      - name: Run the complete release gate
        run: |
          make verify \
            DOCKER_BUILD_FLAGS="--cache-from type=local,src=/tmp/.buildx-cache --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max"

      - name: Migrate Docker layer cache for next run
        if: always()
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache 2>/dev/null || true

      - name: Upload reports, logs, and traces on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: geoguessme-verification-artifacts
          retention-days: 7
          if-no-files-found: ignore
          path: |
            frontend/playwright-report/
            frontend/test-results/
            frontend/coverage/
            backend/coverage.out
            coverage/
