# Tiered pull-request verification.
#
# Pull requests receive fast deterministic checks plus only the live-stack
# suites selected by their changed paths. Release PRs must carry the exact tree
# from the already deployed dev branch. The complete operational gate runs once
# in deploy.yml after a dev merge and again on the nightly schedule.
name: CI

on:
  pull_request:
    branches: [dev, main]

permissions:
  contents: read
  actions: read

jobs:
  policy:
    name: Contribution policy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Enforce branch flow and deployed release source
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$BASE_REF" != main ]]; then
            exit 0
          fi
          if [[ "$HEAD_REPOSITORY" != "$GITHUB_REPOSITORY" || "$HEAD_REF" != release/* ]]; then
            echo "Only a repository release/* branch may open a pull request to main." >&2
            exit 1
          fi
          dev_sha=$(gh api "repos/$GITHUB_REPOSITORY/branches/dev" --jq '.commit.sha')
          dev_tree=$(gh api "repos/$GITHUB_REPOSITORY/git/commits/$dev_sha" --jq '.tree.sha')
          head_tree=$(gh api "repos/$GITHUB_REPOSITORY/git/commits/$HEAD_SHA" --jq '.tree.sha')
          if [[ "$head_tree" != "$dev_tree" ]]; then
            echo "The release branch tree does not exactly match the current dev tree." >&2
            exit 1
          fi
          runs=$(gh api \
            "repos/$GITHUB_REPOSITORY/actions/workflows/deploy.yml/runs?branch=dev&event=push&status=success&per_page=100")
          deployed=$(jq --arg sha "$dev_sha" \
            '[.workflow_runs[] | select(.head_sha == $sha)] | length' <<<"$runs")
          if (( deployed == 0 )); then
            echo "The dev head has not completed a successful development deployment." >&2
            exit 1
          fi

  classify:
    name: Classify changed paths
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      backend: ${{ steps.scope.outputs.backend }}
      frontend: ${{ steps.scope.outputs.frontend }}
      full: ${{ steps.scope.outputs.full }}
      docs_only: ${{ steps.scope.outputs.docs_only }}
    steps:
      - name: Check out pull request
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0
      - name: Resolve test scope
        id: scope
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git diff --name-only -z "$BASE_SHA" "$HEAD_SHA" |
            tools/quality/ci/classify-changes.sh --null >> "$GITHUB_OUTPUT"

  fast:
    name: Fast deterministic checks
    if: github.base_ref != 'main'
    needs: classify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out pull request
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - name: Bootstrap pinned tools
        run: make bootstrap
      - name: Run selected fast gate
        env:
          DOCS_ONLY: ${{ needs.classify.outputs.docs_only }}
        run: |
          if [[ "$DOCS_ONLY" == true ]]; then
            make preflight-docs
          else
            make preflight
          fi
      - name: Upload fast-gate diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: geoguessme-fast-${{ github.run_id }}
          retention-days: 7
          if-no-files-found: ignore
          path: |
            frontend/coverage/
            backend/coverage.out

  backend:
    name: Backend integration
    if: github.base_ref != 'main' && needs.classify.outputs.backend == 'true'
    needs: classify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out pull request
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
        with:
          buildkitd-config-inline: |
            [worker.oci]
              gc = true
              gckeepstorage = 12000000000
      - name: Restore backend Docker cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: /tmp/.buildx-cache
          key: docker-${{ runner.os }}-pr-backend-${{ hashFiles('backend/go.sum', 'frontend/package-lock.json') }}
          restore-keys: docker-${{ runner.os }}-pr-backend-
      - name: Bootstrap integration tools
        run: make bootstrap-integration
      - name: Run backend integration
        env:
          BUILDX_BUILDER: ${{ steps.buildx.outputs.name }}
        run: |
          make pr-backend \
            DOCKER_BUILD_FLAGS="--cache-from type=local,src=/tmp/.buildx-cache --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max"
      - name: Save backend Docker cache
        if: always()
        run: |
          if [[ -d /tmp/.buildx-cache-new ]]; then
            rm -rf /tmp/.buildx-cache
            mv /tmp/.buildx-cache-new /tmp/.buildx-cache
          fi

  frontend:
    name: Chromium end-to-end
    if: github.base_ref != 'main' && needs.classify.outputs.frontend == 'true'
    needs: classify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out pull request
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
        with:
          buildkitd-config-inline: |
            [worker.oci]
              gc = true
              gckeepstorage = 12000000000
      - name: Restore frontend Docker cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: /tmp/.buildx-cache
          key: docker-${{ runner.os }}-pr-frontend-${{ hashFiles('backend/go.sum', 'frontend/package-lock.json') }}
          restore-keys: docker-${{ runner.os }}-pr-frontend-
      - name: Bootstrap E2E tools
        run: make bootstrap-e2e
      - name: Run Chromium E2E
        env:
          BUILDX_BUILDER: ${{ steps.buildx.outputs.name }}
        run: |
          make pr-frontend \
            DOCKER_BUILD_FLAGS="--cache-from type=local,src=/tmp/.buildx-cache --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max"
      - name: Save frontend Docker cache
        if: always()
        run: |
          if [[ -d /tmp/.buildx-cache-new ]]; then
            rm -rf /tmp/.buildx-cache
            mv /tmp/.buildx-cache-new /tmp/.buildx-cache
          fi
      - name: Upload browser diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: geoguessme-e2e-${{ github.run_id }}
          retention-days: 7
          if-no-files-found: ignore
          path: |
            frontend/playwright-report/
            frontend/test-results/

  gate:
    name: Dockerized verification gate
    if: always()
    needs: [policy, classify, fast, backend, frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require every selected check
        env:
          POLICY: ${{ needs.policy.result }}
          CLASSIFY: ${{ needs.classify.result }}
          FAST: ${{ needs.fast.result }}
          BACKEND: ${{ needs.backend.result }}
          FRONTEND: ${{ needs.frontend.result }}
        run: |
          for result in "$POLICY" "$CLASSIFY" "$FAST" "$BACKEND" "$FRONTEND"; do
            case "$result" in
              success | skipped) ;;
              *) echo "A required or selected check ended with: $result" >&2; exit 1 ;;
            esac
          done
