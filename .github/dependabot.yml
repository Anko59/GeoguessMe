version: 2
updates:
  - package-ecosystem: gomod
    directory: /backend
    target-branch: dev
    open-pull-requests-limit: 5
    schedule: { interval: weekly }
    groups:
      go-modules:
        patterns: ["*"]
        update-types: [minor, patch]
  - package-ecosystem: npm
    directory: /frontend
    target-branch: dev
    open-pull-requests-limit: 5
    schedule: { interval: weekly }
    groups:
      npm-compatible:
        patterns: ["*"]
        update-types: [minor, patch]
  - package-ecosystem: github-actions
    directory: /
    target-branch: dev
    open-pull-requests-limit: 3
    schedule: { interval: weekly }
    groups:
      github-actions:
        patterns: ["*"]
