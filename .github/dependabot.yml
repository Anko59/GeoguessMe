version: 2
updates:
  - package-ecosystem: gomod
    directory: /backend
    target-branch: dev
    schedule: { interval: weekly }
    groups:
      go-modules:
        patterns: ["*"]
  - package-ecosystem: npm
    directory: /frontend
    target-branch: dev
    schedule: { interval: weekly }
    groups:
      npm-dependencies:
        patterns: ["*"]
  - package-ecosystem: github-actions
    directory: /
    target-branch: dev
    schedule: { interval: weekly }
    groups:
      github-actions:
        patterns: ["*"]
